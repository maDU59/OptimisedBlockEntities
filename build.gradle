buildscript {
    repositories {
        // These repositories are only for Gradle plugins, put any other repositories in the repository block further below
        maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
        mavenCentral()
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
    }
}

plugins {
    id 'java'
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[7.0.29,8.0)'
    id "me.modmuss50.mod-publish-plugin" version "2.0.0"
    id 'net.minecraftforge.renamer' version '1.0.14'
    id 'net.minecraftforge.jarjar' version '0.2.3'
}

group = mod_group_id
version = mod_version

base.archivesName = mod_id + "+" + minecraft_version + "-forge"

java.toolchain.languageVersion = JavaLanguageVersion.of(17)


minecraft {
    mappings channel: mapping_channel, version: mapping_version

    accessTransformer = true

    runs {
        configureEach {
            workingDir.convention layout.projectDirectory.dir('run')

            //systemProperty 'forge.logging.markers', 'REGISTRIES'

            systemProperty 'forge.logging.console.level', 'debug'

            systemProperty 'eventbus.api.strictRuntimeChecks', 'true'

            //args "-mixin.config=${mod_id}.mixins.json"
        }

        register('client') {
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
        }

        register('server') {
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        register('gameTestServer') {
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
        }

        register('data') {
            workingDir = layout.projectDirectory.dir('run-data')

            args '--mod', mod_id, '--all', '--output', layout.projectDirectory.dir('src/generated/resources'), '--existing', layout.projectDirectory.dir('src/main/resources')
        }
    }
}

jarJar.register() {
    archiveClassifier = null
}

renamer.enableMixinRefmaps {
    config "${mod_id}.mixins.json"
}
renamer.classes(tasks.named('jar', Jar)) {
    archiveClassifier = 'srg'
    // We need to use the generated mappings, which includes things generated by the annotation processor
    mappings renamer.mixin.generatedMappings
}

tasks.named('renameJar') {
    dependsOn(tasks.named('jarJar'))
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir layout.projectDirectory.dir('src/generated/resources') }

repositories {
    minecraft.mavenizer(it)
    maven fg.forgeMaven
    maven fg.minecraftLibsMaven
    exclusiveContent {
        forRepository {
            maven {
                name = 'Sponge'
                url = 'https://repo.spongepowered.org/repository/maven-public'
            }
        }
        filter {
            includeGroupAndSubgroups('org.spongepowered')
        }
    }
    mavenCentral()
    mavenLocal()
    maven {
		name = "CurseForge"
		url = "https://cursemaven.com"
		content {
			includeGroup "curse.maven"
		}
	}
	maven { url "https://maven.neoforged.net/releases/"}
	maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
        content {
            includeGroup "maven.modrinth"
        }
    }
	maven { url "https://maven.caffeinemc.net/releases"}
    maven { url 'https://jitpack.io' }
	maven { url 'https://repo.codemc.org/repository/maven-public/'}
    maven { url "https://maven.su5ed.dev/releases"}
    maven { url "https://maven.fabricmc.net"}
}

dependencies {
    // Specify the version of Minecraft to use.
    // Any artifact can be supplied so long as it has a "userdev" classifier artifact and is a compatible patcher artifact.
    // The "userdev" classifier will be requested and setup by ForgeGradle.
    // If the group id is "net.minecraft" and the artifact id is one of ["client", "server", "joined"],
    // then special handling is done to allow a setup of a vanilla dependency without the use of an external repository.
    implementation minecraft.dependency("net.minecraftforge:forge:$minecraft_version-$forge_version")

    compileOnly(annotationProcessor("io.github.llamalad7:mixinextras-common:0.5.4"))
    implementation("io.github.llamalad7:mixinextras-forge:0.5.4")
    jarJar("io.github.llamalad7:mixinextras-forge:0.5.4")

    compileOnly "maven.modrinth:forgified-fabric-api:0.92.6+1.11.14+1.20.1"

    compileOnly "maven.modrinth:embeddium:0.3.31+mc1.20.1"

    implementation 'org.anarres:jcpp:1.4.14'
	compileOnly "maven.modrinth:oculus:1.20.1-1.8.0"
	compileOnly "maven.modrinth:entitytexturefeatures:7.1-forge-1.20.1"
	compileOnly "maven.modrinth:entity-model-features:3.2.4-forge-1.20.1"

    // Example mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    //compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    //compileOnly "mezz.jei:jei-${mc_version}-forge-api:${jei_version}"
    //runtimeOnly "mezz.jei:jei-${mc_version}-forge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // NOTE: Support for deobfuscated dependencies has not yet been added in ForgeGradle 7.
    //implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html

    annotationProcessor 'org.spongepowered:mixin:0.8.7:processor'

}

renamer.mappings(minecraft.dependency.toSrg)

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [minecraft_version   : minecraft_version, minecraft_version_range: minecraft_version_range,
                             forge_version       : forge_version, forge_version_range: forge_version_range,
                             loader_version_range: loader_version_range,
                             mod_id              : mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
                             mod_authors         : mod_authors, mod_description: mod_description,]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

// Example for how to get properties into the manifest for reading at runtime.
tasks.named('jar', Jar).configure {
    manifest {
        attributes(["Specification-Title"     : mod_id,
                    "Specification-Vendor"    : mod_authors,
                    "Specification-Version"   : "1", // We are version 1 of ourselves
                    "Implementation-Title"    : project.name,
                    "Implementation-Version"  : project.jar.archiveVersion,
                    "Implementation-Vendor"   : mod_authors,
                    "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")])
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

publishMods {
    file = tasks.named('renameJar').get().output
    changelog = providers.fileContents(layout.projectDirectory.file("CHANGELOG.md")).asText.get()
    type = STABLE
	version = project.mod_version
    modLoaders.add("forge")
	modLoaders.add("neoforge")

    curseforge {
		displayName = file.map { it.asFile.name }
        projectId = project.curseforge_id
        accessToken = providers.environmentVariable("CURSEFORGE_TOKEN")
        
		minecraftVersionRange {
            start = "1.20.1"
            end = "1.20.1"
        }

        client = true
        server = false
    }
    modrinth {
		displayName = "Optimised Block Entities $project.mod_version"
        projectId = project.modrinth_id
        accessToken = providers.environmentVariable("MODRINTH_TOKEN")

		minecraftVersionRange {
            start = "1.20.1"
            end = "1.20.1"
        }
    }
}