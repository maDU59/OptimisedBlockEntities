plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
	id "me.modmuss50.mod-publish-plugin" version "2.0.0"
}

version = project.mod_version
group = project.maven_group

repositories {
	maven{url = "https://maven.fabricmc.net/"}
    maven{url = "https://maven.caffeinemc.net/releases"}
    maven{url = "https://maven.caffeinemc.net/snapshots"}
	maven{url = "https://api.modrinth.com/maven"}
	maven{url = "https://maven.terraformersmc.com/releases"}
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"obe" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

	accessWidenerPath = file("src/main/resources/obe.classtweaker")
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	modImplementation ("com.terraformersmc:modmenu:${project.modmenu_version}")
	modImplementation "maven.modrinth:sodium:sFfidWgd"

	localRuntime 'org.anarres:jcpp:1.4.14'
    localRuntime 'io.github.douira:glsl-transformer:3.0.0-pre3'
	modImplementation "maven.modrinth:iris:1.9.7+1.21.10-fabric"
	
}

processResources {
	def version = project.version
	inputs.property "version", version

	filesMatching("fabric.mod.json") {
		expand "version": version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	def projectName = project.name
	inputs.property "projectName", projectName

	from("LICENSE") {
		rename { "${it}_$projectName"}
	}
}

base {
	archivesName = project.name + "+" + project.minecraft_version
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}

publishMods {
    file = remapJar.archiveFile
    changelog = providers.fileContents(layout.projectDirectory.file("CHANGELOG.md")).asText.get()
    type = STABLE
	version = project.mod_version
    modLoaders.add("fabric")
	modLoaders.add("quilt")

    curseforge {
		displayName = file.map { it.asFile.name }
        projectId = project.curseforge_id
        accessToken = providers.environmentVariable("CURSEFORGE_TOKEN")
		changelogType = "markdown"
        
		minecraftVersionRange {
            start = "1.21.9"
            end = "1.21.10"
        }

        client = true
        server = false
        requires("fabric-api")
    }
    modrinth {
		displayName = "Optimised Block Entities $project.mod_version"
        projectId = project.modrinth_id
        accessToken = providers.environmentVariable("MODRINTH_TOKEN")

		minecraftVersionRange {
            start = "1.21.9"
            end = "1.21.10"
        }

		requires("fabric-api")
    }
}
